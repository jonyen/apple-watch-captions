name: Weekly Usage Report

# Emails a Deepgram + Fly cost/usage summary every Monday morning.
# 14:00 UTC ≈ 7am PDT / 10am EDT. Adjust the cron for your timezone.
on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch: {} # allow manual runs to test the report

permissions:
  contents: read # checkout (declaring any permissions resets the rest to none)

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        working-directory: backend
        run: npm ci

      - name: Generate usage report
        id: report
        working-directory: backend
        env:
          # Usage-report key (needs Usage:Read scope) — distinct from the relay's
          # transcription key, which lives only in Fly secrets.
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_USAGE_API_KEY }}
          DEEPGRAM_PROJECT_ID: ${{ secrets.DEEPGRAM_PROJECT_ID }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ vars.FLY_APP_NAME }}
          DEEPGRAM_RATE_PER_MIN: ${{ vars.DEEPGRAM_RATE_PER_MIN }}
          FLY_MONTHLY_COST: ${{ vars.FLY_MONTHLY_COST }}
        run: npm run usage-report

      - name: Email usage report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.report.outputs.title }}
          to: ${{ vars.REPORT_EMAIL_TO }}
          from: Watch Captions Report <${{ secrets.MAIL_USERNAME }}>
          html_body: file://backend/report.md
          convert_markdown: true
